services:
  # Production preview (builds and serves via nginx)
  portfolio:
    container_name: portfolio
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  # Development server (hot reload)
  dev:
    container_name: portfolio-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npm start
    volumes:
      - ".:/app"
      - "/app/node_modules"
    ports:
      - "3001:3000"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    profiles:
      - dev
